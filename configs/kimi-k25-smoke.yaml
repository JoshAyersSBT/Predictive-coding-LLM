run:
  output_dir: outputs/pc-llm-kimi-50p-125m
  seed: 42

dataset:
  name: ianncity/KIMI-K2.5-1000000x
  config_name: General-Distillation
  split: train[:50%]
  text_field: messages
  chat_template: true
  validation_split: null
  max_length: 256
  cache_dir: outputs/pc-llm-kimi-50p/dataset-cache
  preprocessing_num_workers: auto

tokenizer:
  name: gpt2

model:
  architecture: gpt
  vocab_size: null
  n_positions: 256
  n_embd: 768
  n_layer: 12
  n_head: 12
  resid_pdrop: 0.1
  embd_pdrop: 0.1
  attn_pdrop: 0.1
  predictive_coding_weight: 0.05

training:
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  weight_decay: 0.1
  warmup_steps: 100
  max_steps: 2000
  logging_steps: 10
  eval_steps: 50
  save_steps: 100
  save_total_limit: 2
  precision: auto
  gradient_checkpointing: true
